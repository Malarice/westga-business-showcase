<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Lookup Engine</title>

    <link rel="stylesheet" href="/css/root.css">
    <link rel="stylesheet" href="/css/dark.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/search.css">
    <link rel="stylesheet" href="/css/critical.css">
    <link rel="stylesheet" href="/css/cards.css">

</head>

<body>

    <header class="minimal-header">
        <h1>Universal Lookup Engine</h1>
        <p>Search any dataset instantly</p>
    </header>

    <section class="search-section">
        <input id="searchInput" placeholder="Search your data..." />
    </section>

    <section id="results" class="results-grid">
        <!-- Cards will be injected here -->
    </section>

    <script src="/js/search.js"></script>
    <button id="themeToggle" class="theme-toggle">🌙</button>
    <script>
  const toggle = document.getElementById("themeToggle");
  const root = document.documentElement;

  // Load saved theme
  const saved = localStorage.getItem("theme");
  if (saved) root.setAttribute("data-theme", saved);

  toggle.addEventListener("click", () => {
    const current = root.getAttribute("data-theme") === "light" ? "dark" : "light";
    root.setAttribute("data-theme", current);
    localStorage.setItem("theme", current);

    toggle.textContent = current === "light" ? "☀️" : "🌙";
  });
</script>


</body>
</html>



</html>
